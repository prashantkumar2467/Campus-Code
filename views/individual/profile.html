<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusCode • Individual Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { primary: { 50: '#E7F0FA', 100: '#D0E1F5', 300: '#4D84C0', 500: '#1E4A7A' } }
        }
      }
    };
  </script>
  <style>
    .sidebar { transition: width .3s cubic-bezier(.4,0,.2,1); overflow: hidden; }
    .sidebar.collapsed .nav-item { justify-content:center; padding-left:0; padding-right:0; }
    .sidebar.collapsed .nav-item i { margin-right:0; font-size:1.25rem; }
    .sidebar.collapsed .nav-item span { display:none; }
    .nav-item {
      transition: all 0.2s ease;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      margin-bottom: 0.25rem;
      color: #374151;
      border-radius: 0.5rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .nav-item:hover { background-color:#f3f4f6; }
    .dark .nav-item { color:#d1d5db; }
    .dark .nav-item:hover { background-color:#374151; }
    .nav-item.active { background-color:#d0e1f5; color:#1e4a7a; }
    .nav-item.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 60%;
      width: 4px;
      background-color: #2e5e99;
      border-radius: 0 4px 4px 0;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 font-sans transition-colors duration-200">
  <div class="flex h-screen overflow-hidden">
    <aside id="mainSidebar" class="sidebar w-64 bg-white dark:bg-gray-800 shadow-sm border-r border-gray-200 dark:border-gray-700 flex flex-col h-screen flex-shrink-0 transition-colors duration-200 z-50">

      <div class="p-6 flex-shrink-0 flex items-center justify-between h-[88px]">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2 overflow-hidden whitespace-nowrap">
          <i class="fas fa-code text-primary-500 text-2xl flex-shrink-0"></i>
          <span id="sidebarLogoText" class="transition-all duration-300 opacity-100 w-auto">CampusCode</span>
        </h1>
        
        <button id="sidebarToggleBtn" class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-primary-500 transition-colors focus:outline-none">
          <i class="fas fa-chevron-left transition-transform duration-300"></i>
        </button>
      </div>

      <nav class="flex-1 px-4 space-y-1 overflow-y-auto mt-2">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="problems.html" class="nav-item"><i class="fas fa-tasks"></i><span>Problems</span></a>
        <a href="contest.html" class="nav-item"><i class="fas fa-trophy"></i><span>Contests</span></a>
        <a href="forum.html" class="nav-item"><i class="fas fa-comments"></i><span>Community</span></a>
        <a href="stats.html" class="nav-item"><i class="fas fa-list"></i><span>Stats</span></a>
        <a href="report.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Report</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i><span>Profile</span></a>
      </nav>

      <div class="p-4 space-y-1 border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex-shrink-0 bottom-menu">
        <a href="support.html" class="nav-item"><i class="far fa-question-circle"></i><span>Help & Support</span></a>
        <div id="settingsTrigger" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></div>
      </div>
    </aside>

    <div class="flex-1 overflow-y-auto">
      <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4">
          <div class="relative flex-1 max-w-xl">
            <i class="fas fa-search text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
            <input class="w-full pl-10 pr-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100" placeholder="Search..." />
          </div>
          <div class="flex items-center gap-3">
            <button id="themeToggleBtn" class="p-2 rounded-full text-gray-500 hover:text-gray-700 dark:text-gray-300"><i class="fas fa-moon text-xl"></i></button>
            <button class="p-2 rounded-full text-gray-500 dark:text-gray-300"><i class="fas fa-bell text-xl"></i></button>
            <button id="headerProfileBtn" class="flex items-center gap-3 p-1 pr-3 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
              <div id="headerAvatar" class="h-9 w-9 rounded-full bg-primary-500 text-white flex items-center justify-center font-bold">I</div>
              <span id="headerName" class="text-sm font-medium text-gray-700 dark:text-gray-200"></span>
            </button>
          </div>
        </div>
      </header>

      <main class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
          <section class="lg:col-span-1 bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-6 text-center">
            <div id="heroAvatar" class="w-24 h-24 rounded-2xl mx-auto bg-primary-500 text-white text-3xl flex items-center justify-center font-bold">I</div>
            <h2 id="displayName" class="mt-4 text-xl font-bold text-gray-900 dark:text-white">Loading...</h2>
            <p id="displayEmail" class="text-sm text-gray-500 dark:text-gray-400"></p>
            <div class="mt-4 flex flex-wrap justify-center gap-2">
              <span id="rankBadge" class="px-3 py-1 rounded-full text-xs bg-primary-50 text-primary-600 dark:bg-primary-900/30 dark:text-primary-300"></span>
              <span class="px-3 py-1 rounded-full text-xs bg-indigo-50 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-300">Individual</span>
            </div>
            <div class="grid grid-cols-3 gap-3 mt-6 text-center">
              <div><p class="text-[10px] uppercase text-gray-500">Solved</p><p id="solvedCount" class="text-xl font-bold text-gray-900 dark:text-white">0</p></div>
              <div><p class="text-[10px] uppercase text-gray-500">Points</p><p id="pointsCount" class="text-xl font-bold text-gray-900 dark:text-white">0</p></div>
              <div><p class="text-[10px] uppercase text-gray-500">Accuracy</p><p id="accuracyCount" class="text-xl font-bold text-gray-900 dark:text-white">0%</p></div>
            </div>
          </section>

          <section class="lg:col-span-3 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <article class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5">
                <p class="text-sm text-gray-500 dark:text-gray-400">Total Submissions</p>
                <p id="totalSubmissions" class="text-3xl font-bold text-gray-900 dark:text-white mt-1">0</p>
              </article>
              <article class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5">
                <p class="text-sm text-gray-500 dark:text-gray-400">Accepted</p>
                <p id="acceptedSubmissions" class="text-3xl font-bold text-green-600 mt-1">0</p>
              </article>
              <article class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5">
                <p class="text-sm text-gray-500 dark:text-gray-400">Top Languages</p>
                <p id="topLanguages" class="text-sm font-semibold text-gray-900 dark:text-white mt-2">-</p>
              </article>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <article class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5">
                <h3 class="font-semibold text-gray-900 dark:text-white mb-4">Difficulty Solved</h3>
                <canvas id="difficultyChart" height="210"></canvas>
              </article>
              <article class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5">
                <h3 class="font-semibold text-gray-900 dark:text-white mb-4">Earned Badges</h3>
                <div id="badgesWrap" class="grid grid-cols-2 gap-3"></div>
              </article>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <div id="profileOverlay" class="fixed inset-0 z-[80] hidden items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="w-[340px] bg-white dark:bg-gray-800 rounded-3xl shadow-2xl overflow-hidden">
      <div class="bg-[#1E4A7A] dark:bg-[#0f2a4a] relative pt-8 pb-16 px-6 text-center">
        <button id="closeProfileOverlay" class="absolute top-4 right-4 text-white/70 hover:text-white"><i class="fas fa-times text-lg"></i></button>
        <div class="absolute left-1/2 bottom-[-45px] -translate-x-1/2">
          <div class="w-24 h-24 rounded-full bg-[#1E4A7A] p-1">
            <div id="overlayAvatar" class="w-full h-full rounded-full bg-[#1E4A7A] flex items-center justify-center text-white text-4xl font-normal border-4 border-white dark:border-gray-800">I</div>
          </div>
        </div>
      </div>
      <div class="pt-14 pb-6 px-6 text-center">
        <h2 id="overlayName" class="text-xl font-bold text-gray-900 dark:text-white"></h2>
        <div class="flex flex-col items-center mt-1 text-sm text-gray-500 dark:text-gray-400">
          <span>Individual</span>
          <span id="overlayEmail"></span>
        </div>
        <div class="flex justify-between mt-6 px-2">
          <div class="text-center"><div class="text-[10px] font-bold uppercase tracking-wide text-primary-500">Solved</div><div id="overlaySolved" class="text-xl font-bold mt-1"></div></div>
          <div class="text-center border-l border-r border-gray-100 dark:border-gray-700 px-4"><div class="text-[10px] font-bold uppercase tracking-wide text-primary-500">Rank</div><div id="overlayRank" class="text-xl font-bold mt-1"></div></div>
          <div class="text-center"><div class="text-[10px] font-bold uppercase tracking-wide text-primary-500">Points</div><div id="overlayPoints" class="text-xl font-bold mt-1"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const els = (id) => document.getElementById(id);
    let diffChart;

    function applyTheme(theme) {
      const root = document.documentElement;
      if (theme === 'dark') { root.classList.add('dark'); localStorage.theme = 'dark'; }
      else { root.classList.remove('dark'); localStorage.theme = 'light'; }
      const icon = document.querySelector('#themeToggleBtn i');
      if (icon) icon.className = root.classList.contains('dark') ? 'fas fa-sun text-xl' : 'fas fa-moon text-xl';
    }

    function initTheme() {
      const current = localStorage.theme || 'light';
      applyTheme(current);
      els('themeToggleBtn')?.addEventListener('click', () => applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark'));
    }

    function initOverlay() {
      const overlay = els('profileOverlay');
      els('headerProfileBtn')?.addEventListener('click', () => { overlay.classList.remove('hidden'); overlay.classList.add('flex'); });
      els('closeProfileOverlay')?.addEventListener('click', () => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); });
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) { overlay.classList.add('hidden'); overlay.classList.remove('flex'); } });
    }
    function initSidebarToggle() {
      const sidebar = els('mainSidebar');
      const toggleBtn = els('sidebarToggleBtn');
      const toggleIcon = toggleBtn?.querySelector('i');
      const logoText = els('sidebarLogoText');
      if (!sidebar || !toggleBtn) return;
      toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        if (sidebar.classList.contains('collapsed')) {
          sidebar.classList.replace('w-64', 'w-20');
          if (toggleIcon) toggleIcon.style.transform = 'rotate(180deg)';
          if (logoText) { logoText.style.opacity = '0'; logoText.style.width = '0px'; }
        } else {
          sidebar.classList.replace('w-20', 'w-64');
          if (toggleIcon) toggleIcon.style.transform = 'rotate(0deg)';
          if (logoText) { logoText.style.opacity = '1'; logoText.style.width = 'auto'; }
        }
      });
    }

    async function loadProfileData() {
      const res = await fetch('/individual/api/profile-data');
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Failed to load profile');
      const p = data.profile;

      els('headerName').textContent = p.user.fullName;
      ['headerAvatar', 'heroAvatar', 'overlayAvatar'].forEach((id) => { els(id).textContent = p.user.initials; });
      els('displayName').textContent = p.user.fullName;
      els('displayEmail').textContent = p.user.email;
      els('rankBadge').textContent = `Global Rank ${p.user.globalRank}`;

      els('solvedCount').textContent = p.user.solved;
      els('pointsCount').textContent = p.user.points;
      els('accuracyCount').textContent = `${p.summary.accuracy}%`;
      els('totalSubmissions').textContent = p.summary.totalSubmissions;
      els('acceptedSubmissions').textContent = p.summary.acceptedSubmissions;
      els('topLanguages').textContent = p.topLanguages.length ? p.topLanguages.map((l) => `${l.language} (${l.count})`).join(', ') : '-';

      els('overlayName').textContent = p.user.fullName;
      els('overlayEmail').textContent = p.user.email;
      els('overlaySolved').textContent = p.user.solved;
      els('overlayRank').textContent = p.user.globalRank;
      els('overlayPoints').textContent = p.user.points;

      const badgesWrap = els('badgesWrap');
      badgesWrap.innerHTML = (p.badges.length ? p.badges : ['Keep Solving']).map((b) => `
        <div class="rounded-xl border border-gray-200 dark:border-gray-700 px-3 py-2 text-sm font-semibold text-gray-700 dark:text-gray-200 bg-gray-50 dark:bg-gray-700/30">${b}</div>
      `).join('');

      const diff = p.difficulty;
      if (diffChart) diffChart.destroy();
      diffChart = new Chart(els('difficultyChart'), {
        type: 'doughnut',
        data: {
          labels: ['Easy', 'Medium', 'Hard'],
          datasets: [{ data: [diff.easy || 0, diff.medium || 0, diff.hard || 0], backgroundColor: ['#10B981', '#F59E0B', '#EF4444'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, cutout: '65%' }
      });
    }

    document.addEventListener('DOMContentLoaded', async () => {
      initTheme();
      initOverlay();
      initSidebarToggle();
      try { await loadProfileData(); } catch (e) { console.error(e); }
    });
  </script>
</body>
</html>
